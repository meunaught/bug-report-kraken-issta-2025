# ── libredwg ──────────────────────────────────────────────────────────────────
# 13 reports found (12 by seviezhou + #188 by linhlhq); paper = 12 bugs / 9 CVEs.
# #253 ≡ #188 (CVE-2020-21843, bit_read_RC heap-overflow via dwg_bmp) — seviezhou
# re-found linhlhq's earlier bug; #188 kept as canonical (CVE-referenced). #256 and
# #257 are SEPARATE double-frees (MATERIAL vs HANDSEED), maintainer-confirmed —
# this supersedes Sonnet 4.6's incorrect "#257 ≡ #256" dedup.

- action: exclude
  report_url: https://github.com/LibreDWG/libredwg/issues/253
  reason: >-
    Duplicate of #188 (CVE-2020-21843) — same heap-buffer-overflow READ in
    bit_read_RC via dwg_bmp (bits.c:316; CVE/v0.10 reports bits.c:318). #188
    (linhlhq, 2020-01) is the earlier report that received the CVE; seviezhou
    re-found it.
  model: claude-opus-4-8

- action: set_related_url
  report_url: https://github.com/LibreDWG/libredwg/issues/188#issuecomment-574493857
  value: https://github.com/LibreDWG/libredwg/issues/253
  reason: "#253 is seviezhou's duplicate of the same bit_read_RC / dwg_bmp overflow"
  model: claude-opus-4-8

- action: set_label
  report_url: https://github.com/LibreDWG/libredwg/issues/257
  value: paper_artifact
  reason: >-
    Distinct double-free of the global HANDSEED handle-ref (alloc in
    dwg_decode_handleref decode.c:4568, freed via dwg_free_header_vars) — separate
    root cause from #256's MATERIAL double-free; maintainer confirmed both.
  model: claude-opus-4-8

- action: set_label
  report_url: https://github.com/LibreDWG/libredwg/issues/259
  value: paper_artifact
  reason: Distinct — malloc-size-error in decode.c:3437, commit 39ef943
