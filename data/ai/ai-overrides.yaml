# ── bento4 ────────────────────────────────────────────────────────────────────
# 8 reports found; paper = 6 bugs / 4 CVEs. Two are duplicates of CVE-bearing
# reports filed by other people; #509 and #615 are kept as canonical (CVE-referenced).

- action: exclude
  report_url: https://github.com/axiomatic-systems/Bento4/issues/544
  reason: >-
    Duplicate of #509 (CVE-2020-23331) — identical null-pointer READ SEGV at
    AP4_DescriptorListWriter::Action (Ap4Descriptor.h:108:28) ← AP4_List::Apply
    (Ap4List.h:353:12). Differs only in the calling container's WriteFields
    (#509 AP4_DecoderConfigDescriptor / #544 AP4_EsDescriptor).
  model: claude-opus-4-8

- action: exclude
  report_url: https://github.com/axiomatic-systems/Bento4/issues/546
  reason: >-
    Duplicate of #615 (CVE-2021-35306) — identical null-pointer READ SEGV at
    AP4_StszAtom::WriteFields (Ap4StszAtom.cpp:122) ← AP4_Atom::Write
    (Ap4Atom.cpp:229) ← AP4_Atom::Clone (Ap4Atom.cpp:316); the CVE text names
    AP4_StszAtom::WriteFields. Differs only in entry path (#546 via
    AP4_SampleDescription ctor / #615 via AP4_ContainerAtom::Clone).
  model: claude-opus-4-8

- action: set_related_url
  report_url: https://github.com/axiomatic-systems/Bento4/issues/509
  value: https://github.com/axiomatic-systems/Bento4/issues/544
  reason: "#544 is the excluded duplicate (EsDescriptor write path)"
  model: claude-opus-4-8

- action: set_related_url
  report_url: https://github.com/axiomatic-systems/Bento4/issues/615
  value: https://github.com/axiomatic-systems/Bento4/issues/546
  reason: >-
    #546 is the excluded duplicate; it is seviezhou's own earlier report
    (2020-08-22) of the same crash later filed as #615 (2021-06-10).
  model: claude-opus-4-8

- action: set_label
