# AI-confirmed overrides
# Same format as data/overrides.yaml; applied first by src/apply.py (pass 2).
# Entries are confirmed by the user one project at a time, then written here directly.
# Each entry carries a `model:` tag recording which model produced it
# (ignored by apply.py — it only reads action/report_url/value).
